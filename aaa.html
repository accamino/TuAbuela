<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Matabuelas - Ciudad Pietroshka</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; }
#ui {
 position:fixed;
 top:10px;
 left:10px;
 color:white;
 background:rgba(0,0,0,0.5);
 padding:10px;
 border-radius:8px;
}
</style>
</head>
<body>
<div id="ui">
<h2>MATABUELAS</h2>
<div>Mapa: Ciudad Pietroshka</div>
<div>Vida: <span id="hp">100</span></div>
<div>Kills: <span id="score">0</span></div>
<div>WASD mover | Mouse mirar | Click disparar</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/PointerLockControls.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// luces
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff,0.6));

// controles tipo shooter
const controls = new THREE.PointerLockControls(camera, document.body);
document.body.addEventListener("click",()=>controls.lock());
scene.add(controls.getObject());

// suelo
const ground = new THREE.Mesh(
 new THREE.PlaneGeometry(500,500),
 new THREE.MeshStandardMaterial({color:0x3cb043})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ciudad estilo parque placentero
function casa(x,z){
 const base = new THREE.Mesh(
  new THREE.BoxGeometry(6,4,6),
  new THREE.MeshStandardMaterial({color:0xffffff})
 );
 base.position.set(x,2,z);
 scene.add(base);

 const roof = new THREE.Mesh(
  new THREE.ConeGeometry(5,3,4),
  new THREE.MeshStandardMaterial({color:0xaa0000})
 );
 roof.position.set(x,5,z);
 roof.rotation.y=Math.PI/4;
 scene.add(roof);
}

for(let x=-40;x<=40;x+=20){
 for(let z=-40;z<=40;z+=20){
  casa(x,z);
 }
}

// jugador = nieto
const player = new THREE.Mesh(
 new THREE.CapsuleGeometry(0.5,1.2,4,8),
 new THREE.MeshStandardMaterial({color:0x0000ff})
);
player.visible=false;
scene.add(player);

// abuelas enemigas
const enemies=[];

function crearAbuela(){
 const group = new THREE.Group();

 const cuerpo = new THREE.Mesh(
  new THREE.CylinderGeometry(0.6,0.8,2,16),
  new THREE.MeshStandardMaterial({color:0xffc0cb})
 );
 cuerpo.position.y=1;
 group.add(cuerpo);

 const cabeza = new THREE.Mesh(
  new THREE.SphereGeometry(0.5,16,16),
  new THREE.MeshStandardMaterial({color:0xffe0bd})
 );
 cabeza.position.y=2.4;
 group.add(cabeza);

 group.position.set((Math.random()-0.5)*80,0,(Math.random()-0.5)*80);
 scene.add(group);
 enemies.push(group);
}

setInterval(crearAbuela,3000);

// disparo
const raycaster=new THREE.Raycaster();
window.addEventListener("click",()=>{
 raycaster.setFromCamera(new THREE.Vector2(0,0),camera);
 const hits=raycaster.intersectObjects(enemies,true);
 if(hits.length>0){
  const e=hits[0].object.parent;
  scene.remove(e);
  enemies.splice(enemies.indexOf(e),1);
  score++;
  document.getElementById("score").innerText=score;
 }
});

// movimiento
const keys={};
window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let hp=100;
let score=0;

function animate(){
 requestAnimationFrame(animate);

 if(keys["w"]) controls.moveForward(0.15);
 if(keys["s"]) controls.moveForward(-0.15);
 if(keys["a"]) controls.moveRight(-0.15);
 if(keys["d"]) controls.moveRight(0.15);

 // IA abuelas
 enemies.forEach(e=>{
  e.lookAt(camera.position);
  e.position.x += (camera.position.x-e.position.x)*0.01;
  e.position.z += (camera.position.z-e.position.z)*0.01;

  if(e.position.distanceTo(camera.position)<1.5){
   hp-=0.1;
   document.getElementById("hp").innerText=Math.floor(hp);
  }
 });

 renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
 camera.aspect=window.innerWidth/window.innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
